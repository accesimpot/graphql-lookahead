name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.head_ref || github.run_id }}-${{ github.event_name }}-ci
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test

    steps:
      - name: Checkout branch 🛎
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for nrwl/nx-set-shas

      # NRWL action name refers to Nx “affected”, but the step only resolves robust base/head
      # SHAs for git and tools like Turborepo (`TURBO_SCM_BASE` / `--affected`). Nx does not
      # run here; keeping this action avoids hand-rolled SHA logic on PRs vs pushes.
      # https://nx.dev/nx-api/nx/documents/affected
      - name: Set SHAs for `nx affected` commands
        id: setSHAs
        uses: nrwl/nx-set-shas@v4

      - name: Install pnpm 👨🏻‍💻
        uses: pnpm/action-setup@v4
        with:
          # Reads exact version from root package.json "packageManager"
          package_json_file: package.json

      - name: Setup node env 🏗
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'

      - name: Install dependencies 👨🏻‍💻
        run: pnpm install --prod=false

      - name: Any change made to packages❔
        id: affected
        env:
          TURBO_TELEMETRY_DISABLED: '1'
          TURBO_SCM_BASE: ${{ steps.setSHAs.outputs.base }}
          TURBO_SCM_HEAD: ${{ steps.setSHAs.outputs.head }}
        run: |
          set -euo pipefail
          base="${{ steps.setSHAs.outputs.base }}"
          head="${{ steps.setSHAs.outputs.head }}"

          if ! git diff --quiet "$base" "$head" -- \
              package.json pnpm-lock.yaml pnpm-workspace.yaml turbo.json; then
            echo "count=1" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          task_count="$(pnpm exec turbo run build --affected --dry-run=json 2>/dev/null | jq -r '.tasks // [] | length')"
          if [ "${task_count:-0}" -gt 0 ]; then
            echo "count=1" >> "$GITHUB_OUTPUT"
          else
            echo "count=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Build all packages 📦
        if: steps.affected.outputs.count > 0
        run: pnpm build

      - name: Run type check 🚨
        if: steps.affected.outputs.count > 0
        run: pnpm types:check

      - name: Run linter 👀
        # Running linter even if no package has changes since we also want to lint Github workflows.
        # Only running against files changed in the current PR.
        run: |
          pnpm lint:base $(git diff --name-only --diff-filter=d ${{ steps.setSHAs.outputs.base }} | grep -E "\.[mc]?[jt]s$" | xargs)

      - name: Run format check 💄
        # Only running against files changed in the current PR
        run: |
          pnpm format:check $(git diff --name-only --diff-filter=d ${{ steps.setSHAs.outputs.base }} | grep -E "\.([mc]?[jt]s|json|ya?ml|gql|graphql)$" | xargs)

      - name: Run tests 🧪
        if: steps.affected.outputs.count > 0
        # Always run the full Vitest suite when any workspace package changed (includes playground integration tests).
        run: pnpm test
