name: Release

on:
  push:
    branches:
      - main
      - beta

# https://docs.npmjs.com/trusted-publishers#step-2-configure-your-cicd-workflow
permissions:
  id-token: write # Required for OIDC
  contents: write # Required for semantic-release to push commits, tags, and create releases
  issues: write # Required by @semantic-release/github to comment on released issues
  pull-requests: write # Required by @semantic-release/github to comment on released pull requests

jobs:
  should-proceed:
    name: Proceed with the release?
    runs-on: ubuntu-latest

    outputs:
      rebasing-beta: ${{ steps.rebasing-beta.outputs.rebasing }}

    steps:
      - name: Checkout branch 🛎
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Is rebasing beta?
        id: rebasing-beta
        run: |
          github_ref="${{ github.ref }}"

          if [[ $github_ref != 'refs/heads/beta' ]]; then
            echo "rebasing=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          changes=$(git diff HEAD..origin/main --name-only)

          if [[ $? != 0 ]]; then
            echo "rebasing=error" >> $GITHUB_OUTPUT
          elif [[ $changes ]]; then
            echo "rebasing=false" >> $GITHUB_OUTPUT
          else
            echo "rebasing=true" >> $GITHUB_OUTPUT
          fi

  release:
    name: Release
    if: needs.should-proceed.outputs.rebasing-beta == 'false'
    needs: [should-proceed]
    runs-on: ubuntu-latest

    env:
      CI_FORCE_RELEASE_RUN: ${{ secrets.CI_FORCE_RELEASE_RUN }}

    steps:
      # https://semantic-release.gitbook.io/semantic-release/recipes/ci-configurations/github-actions#pushing-package.json-changes-to-your-repository
      - name: Checkout branch 🛎
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0 # Required for nrwl/nx-set-shas

      - name: Get GitHub App token 🔐
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: graphql-lookahead

      # NRWL action name refers to Nx “affected”, but the step only resolves robust base/head
      # SHAs for git and tools like Turborepo (`TURBO_SCM_BASE` / `--affected`). Nx does not
      # run here; keeping this action avoids hand-rolled SHA logic on PRs vs pushes.
      # https://nx.dev/nx-api/nx/documents/affected
      - name: Set SHAs for `nx affected` commands
        id: setSHAs
        uses: nrwl/nx-set-shas@v4

      - name: Install pnpm 👨🏻‍💻
        uses: pnpm/action-setup@v4
        with:
          # Reads exact version from root package.json "packageManager"
          package_json_file: package.json

      - name: Setup node env 🏗
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'

      - name: Install dependencies 👨🏻‍💻
        run: pnpm install --prod=false

      # Trusted publishing: verifyConditions uses JS OIDC, but `npm publish` must use npm CLI ≥11.5.1.
      # Node 22 still ships npm 10.x, and execa({ preferLocal: true }) does not find npm in root .bin,
      # so the runner's old `npm` was used → ENEEDAUTH on publish.
      - name: Use npm CLI with trusted publishing support 📌
        run: |
          npm install -g npm@^11.5.1
          echo "npm $(npm --version) — OIDC publish requires 11.5.1+"

      - name: Any change affecting the main package❔
        id: main-package-affected
        env:
          TURBO_TELEMETRY_DISABLED: '1'
          TURBO_SCM_BASE: ${{ steps.setSHAs.outputs.base }}
          TURBO_SCM_HEAD: ${{ steps.setSHAs.outputs.head }}
        run: |
          set -euo pipefail
          base="${{ steps.setSHAs.outputs.base }}"
          head="${{ steps.setSHAs.outputs.head }}"

          # Matches semantic-release rules (docs/README, root manifests, lockfile, workspace).
          if ! git diff --quiet "$base" "$head" -- \
            README.md package.json pnpm-lock.yaml pnpm-workspace.yaml turbo.json; then
            echo "count=1" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Turborepo: main's build task or any of its workspace dependencies (transitive).
          task_count="$(pnpm exec turbo run build --filter=main --affected --dry-run=json 2>/dev/null | jq -r '.tasks // [] | length')"
          if [ "${task_count:-0}" -gt 0 ]; then
            echo "count=1" >> "$GITHUB_OUTPUT"
          else
            echo "count=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Build main package 📦
        if: ${{ steps.main-package-affected.outputs.count > 0 || env.CI_FORCE_RELEASE_RUN == 'true' }}
        run: pnpm main build

      # A release is made if the prefix is feat, fix, perf, chore(deps), or docs(README)
      #
      # { type: 'feat', release: 'minor' },
      # { type: 'fix', release: 'patch' },
      # { type: 'perf', release: 'patch' },
      # { type: 'chore', scope: 'deps', release: 'patch' },
      # { type: 'docs', scope: 'README', release: 'patch' },
      #
      # See https://github.com/conventional-changelog/conventional-changelog/tree/master/packages/conventional-changelog-angular#type
      #
      # Available types:
      #   - feat: A new feature
      #   - fix: A bug fix
      #   - docs: Documentation only changes
      #   - style: Changes that do not affect the meaning of the code (white-space, formatting, missing semi-colons, etc)
      #   - refactor: A code change that neither fixes a bug nor adds a feature
      #   - perf: A code change that improves performance
      #   - test: Adding missing tests or correcting existing tests
      #   - build: Changes that affect the build system or external dependencies (example scopes: gulp, broccoli, npm)
      #   - ci: Changes to our CI configuration files and scripts (example scopes: Travis, Circle, BrowserStack, SauceLabs)
      #   - chore: Other changes that don't modify src or test files
      #   - revert: Reverts a previous commit
      #
      - name: Release
        if: ${{ steps.main-package-affected.outputs.count > 0 || env.CI_FORCE_RELEASE_RUN == 'true' }}
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: pnpm semantic-release
